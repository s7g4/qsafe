version: '3.8'

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: your_secure_db_password
      POSTGRES_DB: qsafe_prod
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://postgres:your_secure_db_password@postgres:5432/qsafe_prod
      JWT_SECRET: your-super-secret-jwt-key-here-minimum-32-chars
      PORT: 3000
      HSM_MOCK: "true"
      CORS_ORIGIN: "http://localhost:3000"
      DB_MAX_CONNECTIONS: "20"
    depends_on:
      postgres:
        condition: service_healthy
    restart: always

volumes:
  pgdata:
