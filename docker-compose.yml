services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in a .env file next to this compose file}
      POSTGRES_DB: qsafe_prod
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in a .env file next to this compose file}@postgres:5432/qsafe_prod
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in a .env file next to this compose file (32+ random characters)}
      PORT: 3000
      HSM_MOCK: "true"
      CORS_ORIGIN: "http://localhost:3000"
      DB_MAX_CONNECTIONS: "20"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 3
    restart: always

volumes:
  pgdata:
