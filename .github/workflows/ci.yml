name: Q-Safe CI Pipeline

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-test:
    name: Code Verification
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: qsafe_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/qsafe_test
      JWT_SECRET: ci-test-secret-key-minimum-32-chars-long
      HSM_MOCK: "true"

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Rust Toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy
        targets: thumbv6m-none-eabi

    - name: Install System Dependencies (libudev)
      run: |
        sudo apt-get update
        sudo apt-get install -y libudev-dev

    - name: Cache Cargo Dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          target/
        # sqlx::migrate!() embeds host-server/migrations/*.sql at compile
        # time, but changes to those files alone don't reliably trigger a
        # rebuild of the cached target/ dir (verified: a new migration
        # added without touching any .rs file silently kept the stale,
        # already-compiled binary - the FK-drop in migration 0004 didn't
        # take effect until something forced a real recompile). Hashing
        # the migrations directory into the cache key means any migration
        # change busts the cache instead of restoring a stale build.
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock', 'host-server/migrations/**') }}
        restore-keys: |
          ${{ runner.os }}-cargo-

    - name: Verify Code Formatting
      run: cargo fmt --all -- --check

    - name: Run Static Analysis (Clippy) - Host Crates
      run: cargo clippy -p qsafe-backend -p qsafe-common --all-targets -- -D warnings

    - name: Run Static Analysis (Clippy) - Embedded Firmware
      run: cargo clippy -p qsafe-firmware --target thumbv6m-none-eabi -- -D warnings

    - name: Check Embedded Firmware Compilation
      run: cargo check -p qsafe-firmware --target thumbv6m-none-eabi

    - name: Execute Workspace Tests
      run: cargo test -p qsafe-backend -p qsafe-common

    - name: Security Audit
      run: |
        cargo install cargo-audit --locked
        cargo audit
      continue-on-error: true

    - name: Dependency Check (cargo-deny)
      run: |
        cargo install cargo-deny --locked
        cargo deny check
      continue-on-error: true
